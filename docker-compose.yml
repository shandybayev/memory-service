services:
  memory-service:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - memory_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/memory.db
      - LOG_LEVEL=INFO
      - MAX_TURN_PAYLOAD_BYTES=1048576
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  memory_data:
